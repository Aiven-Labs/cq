# PostgreSQL backend configuration for cq server
# Usage: docker compose -f docker-compose.yml -f docker-compose.postgres.yml up

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cq
      POSTGRES_USER: cq
      POSTGRES_PASSWORD: ${CQ_PG_PASSWORD:?Set CQ_PG_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cq"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  cq-server:
    environment:
      - CQ_DATABASE_URL=postgresql://cq:${CQ_PG_PASSWORD}@postgres:5432/cq
      - CQ_DB_PATH=  # Clear the SQLite path
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
